# LLM config for P1-base (intent extraction, plan.md §5 P1).
# Served via the Ollama API — /api/chat with messages format.
#
# Token budget: first attempt uses max_new_tokens (1200); on any failure
# (empty / parse error / schema error / done_reason=="length") retries with
# retry_max_new_tokens (4096).  Never starts at 4096 unconditionally.

model_id: gemma4:26b
api_url: http://localhost:11434/api/chat

temperature: 0.0
max_new_tokens: 1200           # default budget for p1_base
retry_max_new_tokens: 4096     # retry budget (used only on failure)

think: false                   # disable gemma4 thinking tokens (options.think=false in payload)
format_json: true              # add format:"json" at top level of Ollama payload

prompt_version: p1_v1
cache_db: data/llm_cache/llm_cache.sqlite

retry_max: 2
